name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BAMBOO_CLI_VERSION: "0.3.7"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache bamboo-cli binary
        id: cache-bamboo
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/bamboo
          key: bamboo-cli-${{ runner.os }}-${{ env.BAMBOO_CLI_VERSION }}

      - name: Install bamboo-cli
        if: steps.cache-bamboo.outputs.cache-hit != 'true'
        run: cargo install bamboo-cli --version "${{ env.BAMBOO_CLI_VERSION }}" --locked

      - name: Build site
        run: bamboo build --output dist --base-url "https://matthewberger.dev"

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
